<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokémon Stats Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── CARD ── */
    .card {
      width: 320px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      background: #fff;
    }

    /* ── HEADER (cor muda por tipo) ── */
    .card-header {
      padding: 24px 24px 60px;
      position: relative;
      transition: background .4s;
    }
    .card-header.grass  { background: #62b957; }
    .card-header.fire   { background: #ff6b4a; }
    .card-header.water  { background: #4fc3f7; }
    .card-header.bug    { background: #8bc34a; }
    .card-header.flying { background: #81d4fa; }
    .card-header.poison { background: #ab47bc; }

    .card-header .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255,255,255,.85);
      font-size: 13px;
    }
    .back-btn { cursor: pointer; font-size: 20px; }
    .fav-btn  { cursor: pointer; font-size: 18px; }

    .poke-number {
      color: rgba(255,255,255,.7);
      font-weight: 800;
      font-size: 13px;
      margin-top: 8px;
    }
    .poke-name {
      color: #fff;
      font-size: 28px;
      font-weight: 800;
      margin: 2px 0 8px;
    }

    /* ── BADGES DE TIPO ── */
    .types { display: flex; gap: 6px; flex-wrap: wrap; }
    .type-badge {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }
    .type-grass  { background: rgba(255,255,255,.25); }
    .type-fire   { background: rgba(255,255,255,.25); }
    .type-water  { background: rgba(255,255,255,.25); }
    .type-bug    { background: rgba(255,255,255,.25); }
    .type-flying { background: rgba(255,255,255,.25); }
    .type-poison { background: rgba(255,255,255,.25); }

    /* ── IMAGEM ── */
    .poke-img-wrap {
      position: absolute;
      right: 16px;
      bottom: -30px;
    }
    .poke-img-wrap img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.25));
      transition: transform .3s;
    }
    .poke-img-wrap img:hover { transform: scale(1.08) rotate(-3deg); }

    /* círculo decorativo */
    .circle-deco {
      position: absolute;
      right: 10px; bottom: -10px;
      width: 130px; height: 130px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
      pointer-events: none;
    }

    /* ── BODY ── */
    .card-body { padding: 16px 20px 24px; }

    /* ── TABS ── */
    .tabs {
      display: flex;
      justify-content: space-around;
      margin-bottom: 16px;
      border-bottom: 1px solid #eee;
    }
    .tab {
      padding: 8px 4px;
      font-size: 13px;
      font-weight: 700;
      color: #aaa;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .tab.active {
      color: #333;
      border-bottom-color: #5c6bc0;
    }

    /* ── PAINÉIS ── */
    .panel { display: none; animation: fadeIn .25s ease; }
    .panel.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* ── ABOUT ── */
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13.5px;
      border-bottom: 1px solid #f5f5f5;
    }
    .info-label { color: #aaa; font-weight: 600; }
    .info-value { color: #333; font-weight: 700; text-align: right; max-width: 60%; }

    .section-title {
      font-size: 14px;
      font-weight: 800;
      color: #333;
      margin: 14px 0 6px;
    }

    /* ── BASE STATS ── */
    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .stat-name {
      width: 52px;
      font-size: 12px;
      font-weight: 700;
      color: #aaa;
      flex-shrink: 0;
    }
    .stat-val {
      width: 28px;
      font-size: 13px;
      font-weight: 800;
      color: #333;
      text-align: right;
      flex-shrink: 0;
    }
    .stat-bar-bg {
      flex: 1;
      height: 6px;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
    }
    .stat-bar {
      height: 100%;
      border-radius: 10px;
      transition: width 1s cubic-bezier(.25,.46,.45,.94);
    }
    /* cor da barra por valor */
    .bar-low  { background: #ef5350; }
    .bar-mid  { background: #66bb6a; }
    .bar-high { background: #42a5f5; }

    /* ── EVOLUTION ── */
    .evo-chain {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 0;
    }
    .evo-step { text-align: center; }
    .evo-step img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.15));
      cursor: pointer;
      transition: transform .2s;
    }
    .evo-step img:hover { transform: scale(1.12); }
    .evo-step p {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      margin-top: 4px;
    }
    .evo-arrow {
      font-size: 18px;
      color: #ccc;
      font-weight: 700;
    }
    .evo-level {
      font-size: 10px;
      color: #aaa;
      font-weight: 600;
    }

    /* ── MOVES ── */
    .moves-list { display: flex; flex-direction: column; gap: 6px; }
    .move-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #f7f8fc;
      border-radius: 10px;
      font-size: 13px;
    }
    .move-name { font-weight: 700; color: #333; }
    .move-meta { font-size: 11px; color: #aaa; font-weight: 600; }
    .move-type-badge {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }
    .bg-grass  { background: #62b957; }
    .bg-fire   { background: #ff6b4a; }
    .bg-water  { background: #4fc3f7; }
    .bg-normal { background: #a8a8a8; }
    .bg-poison { background: #ab47bc; }

    /* ── SELETOR DEMO ── */
    .demo-select {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    .demo-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 20px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      color: #fff;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      transition: transform .15s;
    }
    .demo-btn:hover { transform: scale(1.06); }
    .demo-btn.grass  { background: #62b957; }
    .demo-btn.fire   { background: #ff6b4a; }
    .demo-btn.water  { background: #4fc3f7; }
  </style>
</head>
<body>

<!-- ══ CARD ══ -->
<div class="card" id="pokemon-card">

  <!-- HEADER -->
  <div class="card-header" id="card-header">
    <div class="top-row">
      <span class="back-btn">←</span>
      <span class="fav-btn">♡</span>
    </div>
    <div class="poke-number" id="poke-number">#001</div>
    <div class="poke-name" id="poke-name">Bulbasaur</div>
    <div class="types" id="poke-types"></div>
    <div class="circle-deco"></div>
    <div class="poke-img-wrap">
      <img id="poke-img" src="" alt="pokemon"/>
    </div>
  </div>

  <!-- BODY -->
  <div class="card-body">

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" data-tab="about">About</div>
      <div class="tab" data-tab="stats">Base Stats</div>
      <div class="tab" data-tab="evolution">Evolution</div>
      <div class="tab" data-tab="moves">Moves</div>
    </div>

    <!-- PAINEL: ABOUT -->
    <div class="panel active" id="panel-about">
      <div id="about-rows"></div>
      <div class="section-title">Breeding</div>
      <div id="breeding-rows"></div>
    </div>

    <!-- PAINEL: BASE STATS -->
    <div class="panel" id="panel-stats">
      <div id="stats-rows"></div>
    </div>

    <!-- PAINEL: EVOLUTION -->
    <div class="panel" id="panel-evolution">
      <div class="evo-chain" id="evo-chain"></div>
    </div>

    <!-- PAINEL: MOVES -->
    <div class="panel" id="panel-moves">
      <div class="moves-list" id="moves-list"></div>
    </div>

  </div>
</div>

<!-- Seletor de demo -->
<div class="demo-select">
  <button class="demo-btn grass" onclick="loadPokemon('bulbasaur')">🌿 Bulbasaur</button>
  <button class="demo-btn fire"  onclick="loadPokemon('charmander')">🔥 Charmander</button>
  <button class="demo-btn water" onclick="loadPokemon('squirtle')">💧 Squirtle</button>
</div>


<script>
  // ══════════════════════════════════════════
  //  DADOS DOS POKÉMON
  //  Em um projeto real você buscaria da PokeAPI:
  //  https://pokeapi.co/api/v2/pokemon/bulbasaur
  // ══════════════════════════════════════════
  const pokeData = {
    bulbasaur: {
      number: "#001",
      name: "Bulbasaur",
      primaryType: "grass",
      types: ["grass", "poison"],
      img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png",
      about: {
        Species: "Seed",
        Height: "2'3.6\" (0.70 m)",
        Weight: "15.2 lbs (6.9 kg)",
        Abilities: "Overgrow, Chlorophyl",
      },
      breeding: {
        Gender: "♂ 87.5%  ♀ 12.5%",
        "Egg Groups": "Monster",
        "Egg Cycle": "Grass",
      },
      stats: { HP:45, Attack:49, Defense:49, "Sp. Atk":65, "Sp. Def":65, Speed:45 },
      evolution: [
        { name:"Bulbasaur", id:1, level:null },
        { name:"Ivysaur",   id:2, level:16   },
        { name:"Venusaur",  id:3, level:32   },
      ],
      moves: [
        { name:"Tackle",     type:"normal", power:40,  pp:35 },
        { name:"Vine Whip",  type:"grass",  power:45,  pp:25 },
        { name:"Razor Leaf", type:"grass",  power:55,  pp:25 },
        { name:"Poison Powder", type:"poison", power:"-", pp:35 },
      ],
    },
    charmander: {
      number: "#004",
      name: "Charmander",
      primaryType: "fire",
      types: ["fire"],
      img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png",
      about: {
        Species: "Lizard",
        Height: "2'0\" (0.60 m)",
        Weight: "18.7 lbs (8.5 kg)",
        Abilities: "Blaze, Solar Power",
      },
      breeding: {
        Gender: "♂ 87.5%  ♀ 12.5%",
        "Egg Groups": "Monster, Dragon",
        "Egg Cycle": "Fire",
      },
      stats: { HP:39, Attack:52, Defense:43, "Sp. Atk":60, "Sp. Def":50, Speed:65 },
      evolution: [
        { name:"Charmander", id:4,  level:null },
        { name:"Charmeleon", id:5,  level:16   },
        { name:"Charizard",  id:6,  level:36   },
      ],
      moves: [
        { name:"Scratch",   type:"normal", power:40, pp:35 },
        { name:"Ember",     type:"fire",   power:40, pp:25 },
        { name:"Flamethrower", type:"fire", power:90, pp:15 },
        { name:"Slash",     type:"normal", power:70, pp:20 },
      ],
    },
    squirtle: {
      number: "#007",
      name: "Squirtle",
      primaryType: "water",
      types: ["water"],
      img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png",
      about: {
        Species: "Tiny Turtle",
        Height: "1'8\" (0.50 m)",
        Weight: "19.8 lbs (9.0 kg)",
        Abilities: "Torrent, Rain Dish",
      },
      breeding: {
        Gender: "♂ 87.5%  ♀ 12.5%",
        "Egg Groups": "Monster, Water 1",
        "Egg Cycle": "Water",
      },
      stats: { HP:44, Attack:48, Defense:65, "Sp. Atk":50, "Sp. Def":64, Speed:43 },
      evolution: [
        { name:"Squirtle",  id:7,  level:null },
        { name:"Wartortle", id:8,  level:16   },
        { name:"Blastoise", id:9,  level:36   },
      ],
      moves: [
        { name:"Tackle",      type:"normal", power:40, pp:35 },
        { name:"Water Gun",   type:"water",  power:40, pp:25 },
        { name:"Bubble Beam", type:"water",  power:65, pp:20 },
        { name:"Withdraw",    type:"water",  power:"-", pp:40 },
      ],
    },
  };

  // ══════════════════════════════════════════
  //  FUNÇÃO PRINCIPAL: carrega um Pokémon no card
  // ══════════════════════════════════════════
  function loadPokemon(key) {
    const p = pokeData[key];

    // 1. Header
    document.getElementById("card-header").className = `card-header ${p.primaryType}`;
    document.getElementById("poke-number").textContent = p.number;
    document.getElementById("poke-name").textContent   = p.name;
    document.getElementById("poke-img").src            = p.img;

    // 2. Badges de tipo
    const typesEl = document.getElementById("poke-types");
    typesEl.innerHTML = p.types
      .map(t => `<span class="type-badge type-${t}">${t}</span>`)
      .join("");

    // 3. About
    document.getElementById("about-rows").innerHTML =
      Object.entries(p.about)
        .map(([k,v]) => `
          <div class="info-row">
            <span class="info-label">${k}</span>
            <span class="info-value">${v}</span>
          </div>`)
        .join("");

    document.getElementById("breeding-rows").innerHTML =
      Object.entries(p.breeding)
        .map(([k,v]) => `
          <div class="info-row">
            <span class="info-label">${k}</span>
            <span class="info-value">${v}</span>
          </div>`)
        .join("");

    // 4. Base Stats
    const maxStat = 150; // referência para a barra
    document.getElementById("stats-rows").innerHTML =
      Object.entries(p.stats)
        .map(([k,v]) => {
          const pct = Math.min((v / maxStat) * 100, 100);
          const color = v < 50 ? "bar-low" : v < 80 ? "bar-mid" : "bar-high";
          return `
            <div class="stat-row">
              <span class="stat-name">${k}</span>
              <span class="stat-val">${v}</span>
              <div class="stat-bar-bg">
                <div class="stat-bar ${color}" style="width:0%" data-width="${pct}%"></div>
              </div>
            </div>`;
        })
        .join("");

    // 5. Evolution chain
    document.getElementById("evo-chain").innerHTML =
      p.evolution.map((evo, i) => `
        ${i > 0 ? `<div>
          <div class="evo-arrow">→</div>
          <div class="evo-level">Lv ${evo.level}</div>
        </div>` : ""}
        <div class="evo-step">
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${evo.id}.png"
               alt="${evo.name}" title="${evo.name}"/>
          <p>${evo.name}</p>
        </div>`
      ).join("");

    // 6. Moves
    document.getElementById("moves-list").innerHTML =
      p.moves.map(m => `
        <div class="move-item">
          <span class="move-name">${m.name}</span>
          <span class="move-meta">PWR ${m.power} · PP ${m.pp}</span>
          <span class="move-type-badge bg-${m.type}">${m.type}</span>
        </div>`
      ).join("");

    // 7. Volta para a aba About ao trocar de Pokémon
    switchTab("about");
  }

  // ══════════════════════════════════════════
  //  LÓGICA DAS TABS
  // ══════════════════════════════════════════
  function switchTab(tabName) {
    // Remove "active" de todas as tabs e painéis
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));

    // Adiciona "active" na tab e painel corretos
    document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add("active");
    document.getElementById(`panel-${tabName}`).classList.add("active");

    // Anima as barras de stat quando a aba Base Stats for aberta
    if (tabName === "stats") {
      animateBars();
    }
  }

  // Adiciona evento de clique em cada tab
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      switchTab(tab.dataset.tab); // pega o valor de data-tab="..."
    });
  });

  // ══════════════════════════════════════════
  //  ANIMAÇÃO DAS BARRAS DE STAT
  // ══════════════════════════════════════════
  function animateBars() {
    // Primeiro reseta tudo para 0...
    document.querySelectorAll(".stat-bar").forEach(bar => {
      bar.style.width = "0%";
    });
    // ...depois anima com um pequeno delay
    setTimeout(() => {
      document.querySelectorAll(".stat-bar").forEach(bar => {
        bar.style.width = bar.dataset.width; // usa o valor guardado em data-width
      });
    }, 50);
  }

  // ══════════════════════════════════════════
  //  Carrega Bulbasaur ao iniciar a página
  // ══════════════════════════════════════════
  loadPokemon("bulbasaur");
</script>
</body>
</html>
