<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/pokedex.css">
    <link rel="stylesheet" href="/assets/css/modal.css">
</head>
<body>

    <!-- POKÉDEX NORMAL — não muda nada aqui -->
    <section class="content">
        <h1>Pokedex</h1>
        <ol id="pokemonList" class="pokemons"></ol>
        <div class="pagination">
            <button id="loadMoreButton" type="button">Load More</button>
        </div>
    </section>

    <!-- ══ MODAL DE STATS ══
         Estrutura que replica a imagem de referência:
         - modal-bg: fundo colorido com a cor do tipo
         - modal-poke-img: imagem grande do pokémon
         - modal-panel-sheet: painel branco que sobe por baixo
    -->
    <div class="modal-overlay" id="modalOverlay">

        <!-- Fundo colorido — a classe do tipo é trocada via JS -->
        <div class="modal-bg" id="modalBg">

            <!-- Linha do topo: número + botão fechar -->
            <div class="modal-top-info">
                <div class="modal-top-row">
                    <span class="modal-number" id="modalNumber"></span>
                    <button class="modal-close" id="modalClose">✕</button>
                </div>
                <!-- Nome do pokémon -->
                <h2 class="modal-name" id="modalName"></h2>
                <!-- Badges de tipo -->
                <ul class="modal-types" id="modalTypes"></ul>
            </div>

            <!-- Imagem grande — fica sobreposta ao painel branco -->
            <img class="modal-poke-img" id="modalImg" src="" alt=""/>

            <!-- Painel branco deslizando de baixo -->
            <div class="modal-panel-sheet">
                <p class="modal-stats-title">Base Stats</p>

                <!-- As linhas de stat são geradas pelo JS -->
                <div id="statsRows"></div>

                <!-- Peso e Altura -->
                <div class="modal-wh-row">
                    <div class="modal-wh-item">
                        <div class="modal-wh-value" id="modalWeight"></div>
                        <div class="modal-wh-label">Weight</div>
                    </div>
                    <div class="modal-wh-item">
                        <div class="modal-wh-value" id="modalHeight"></div>
                        <div class="modal-wh-label">Height</div>
                    </div>
                </div>
            </div>

            <!-- Loading spinner -->
            <div class="modal-loading" id="modalLoading">
                <div class="modal-spinner"></div>
                Carregando...
            </div>

        </div>
    </div>

    <script src="/assets/js/pokemon-model.js"></script>
    <script src="/assets/js/poke-api.js"></script>
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/modal.js"></script>
</body>
</html>
